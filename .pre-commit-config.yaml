# Run with: prek run --all-files
# Install git hook: prek install
#
# CI installs ruff from uv.lock; this hook pins a separate pre-commit
# version so local hook runs are reproducible. Bump with
# `prek auto-update` when you want a newer ruff.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
