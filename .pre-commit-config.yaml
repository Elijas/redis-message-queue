# Run with: prek run --all-files
# Install git hook: prek install
#
# CI installs ruff unpinned via `pip install ruff`; this hook pins a
# specific version so local runs are reproducible. Bump with
# `prek auto-update` when you want a newer ruff.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
