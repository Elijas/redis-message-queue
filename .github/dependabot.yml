version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    ignore:
      # redis-py 8 is not yet verified against this library's Lua / replay paths
      # (RESP3-default behavior). The redis<8.0.0 cap in pyproject is intentional
      # and enforced by the redis-8 guard in
      # tests/test_from_readme_example_feedback.py; see UPGRADING.md (AC-16).
      # Re-evaluate manually before widening instead of auto-bumping.
      - dependency-name: redis
        versions: [">=8.0.0"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
