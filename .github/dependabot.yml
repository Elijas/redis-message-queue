version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    ignore:
      # redis-py 8 is verified and supported. Keep the pyproject cap below 9.0.0
      # until redis-py 9 is verified against this library's Lua / replay paths.
      # Re-evaluate manually before widening instead of auto-bumping.
      - dependency-name: redis
        versions: [">=9.0.0"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
