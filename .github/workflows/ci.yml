name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Each job below sets timeout-minutes at ~2x its observed healthy runtime
# (test ~9min, coverage ~16min, real-redis/lint/type-check a few min) so a
# degraded GitHub-hosted runner fails fast and is auto-retryable instead of
# hanging to the 6h default — which once stalled a release publish behind a
# wedged test-tag job. Raise a specific bound if a legitimately slow (not
# wedged) runner ever false-fails it.
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: uv sync --no-default-groups --group dev
      - run: uv run --no-sync ruff check
      - run: uv run --no-sync ruff format --check

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: uv sync --no-default-groups --group dev
      - run: uv run --no-sync python devtools/check_mypy_baseline.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        redis-version: ["6.2", "7"]
        redis-py-spec: ["==5.0.1", ">=7,<8", ">=8,<9"]
    services:
      redis:
        image: redis:${{ matrix.redis-version }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --no-default-groups --group test
      - run: uv pip install "redis${{ matrix.redis-py-spec }}"
      - run: uv run --no-sync pytest tests -v

  real-redis-oom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - run: docker exec ${{ job.services.redis.id }} redis-cli CONFIG SET maxmemory 8mb
      - run: docker exec ${{ job.services.redis.id }} redis-cli CONFIG SET maxmemory-policy noeviction
      - run: uv sync --no-default-groups --group test
      - run: uv run --no-sync pytest tests/test_integration_oom.py -v

  real-redis-cluster:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis_cluster:
        image: grokzen/redis-cluster:7.0.15
        env:
          IP: 0.0.0.0
        ports:
          - 7000-7005:7000-7005
        options: >-
          --health-cmd "redis-cli -p 7000 cluster info | grep cluster_state:ok"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      REDIS_CLUSTER_URL: redis://localhost:7000/0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - run: docker exec ${{ job.services.redis_cluster.id }} redis-cli -p 7000 cluster info
      - run: uv sync --no-default-groups --group test
      - run: uv run --no-sync pytest tests/test_integration_cluster.py -v

  real-redis-wrongtype:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - run: uv sync --no-default-groups --group test
      - run: uv run --no-sync pytest tests/test_integration_wrongtype.py -v

  real-redis-decode:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - run: uv sync --no-default-groups --group test
      - run: uv run --no-sync pytest tests/test_integration_decode_responses.py -v

  coverage:
    runs-on: ubuntu-latest
    # Coverage instrumentation roughly doubles the suite's timing variance on
    # shared runners; 30 was hit once at suite size ~2.5k tests.
    timeout-minutes: 40
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/15
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - run: uv sync --no-default-groups --group test
      - run: uv run --no-sync pytest --cov=redis_message_queue --cov-report=xml --junitxml=junit.xml -o junit_family=legacy
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.xml
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: ${{ !cancelled() }}
        with:
          report_type: test_results
          files: junit.xml
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
